<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silence Bot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f13;
      color: #dcddde;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #1e1f24;
      border: 1px solid #2e2f35;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .emoji { font-size: 3.5rem; margin-bottom: 1rem; }
    h1 { font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
    p { color: #96989d; line-height: 1.6; margin-bottom: 2rem; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    a {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    a:hover { opacity: 0.8; }
    .btn-primary { background: #5865f2; color: #fff; }
    .btn-secondary { background: #2e2f35; color: #dcddde; }
    .footer { margin-top: 2rem; color: #4f545c; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🤖</div>
    <h1>Silence Bot</h1>
    <p>Bot oficial do servidor Silence no Discord.<br>Gerencie sua experiência, verifique sua conta Habbo e muito mais.</p>
    <div class="links">
      <a class="btn-primary" href="https://discord.gg/C7ED3CMnVe" target="_blank">Entrar no Servidor</a>
      <a class="btn-secondary" href="/terms">Termos de Serviço</a>
      <a class="btn-secondary" href="/privacy">Política de Privacidade</a>
    </div>
  </div>
  <div class="footer">Silence Bot &copy; 2026 • Habbo Hotel BR</div>
</body>
</html>
